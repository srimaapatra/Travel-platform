<input type="text" id="search" placeholder="Search..." onkeyup="filter()">

<div id="list">

<div class="card"><img src="https://source.unsplash.com/300x200/?goa"><p>Goa</p></div>
<div class="card"><img src="https://source.unsplash.com/300x200/?kashmir"><p>Kashmir</p></div>

</div>

<script>
function filter(){
let input=document.getElementById("search").value.toLowerCase();
let items=document.querySelectorAll("#list .card");

items.forEach(i=>{
i.style.display=i.innerText.toLowerCase().includes(input)?"":"none";
});
}
</script>
